<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who are you? - HOLD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="onboarding-page">
    <nav class="navbar landing-navbar">
        <div class="container">
            <div class="logo landing-logo">HOLD</div>
            <ul class="nav-links landing-nav-links">
                <li><a href="/explore">Trending ETFs</a></li>
                <li><a href="/portfolio">My Portfolio</a></li>
                <li><a href="/dashboard">Creators</a></li>
            </ul>
            <div class="nav-auth">
                <a href="#" class="nav-login">Log in</a>
                <a href="#" class="btn btn-signup-nav">Sign up</a>
            </div>
        </div>
    </nav>

    <section class="onboarding-content">
        <div class="container onboarding-container">
            <a href="/" class="back-link">← Back</a>
            
            <div class="onboarding-form">
                <h1 class="onboarding-title">Who are you?</h1>
                
                <div class="profile-icon-large">
                    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="60" cy="60" r="60" fill="#2A2A2A"/>
                        <circle cx="60" cy="45" r="20" fill="#1A1A1A"/>
                        <path d="M30 95C30 80 43 70 60 70C77 70 90 80 90 95" fill="#1A1A1A"/>
                    </svg>
                </div>

                <div class="form-group-onboarding">
                    <label for="userName">Your name*</label>
                    <input type="text" id="userName" name="userName" value="Sarah" required>
                </div>

                <div class="form-group-onboarding">
                    <label for="userBackground">Your background/specialties</label>
                    <input type="text" id="userBackground" name="userBackground" value="Penny stocks, crypto, prediction markets">
                </div>

                <button type="button" id="connect-wallet-btn" class="btn btn-primary-onboarding">Connect your wallet</button>
            </div>
        </div>
    </section>

    <div class="onboarding-progress">
        <div class="progress-bar">
            <div class="progress-step active" data-step="1">
                <div class="progress-dot"></div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step" data-step="2">
                <div class="progress-dot"></div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step" data-step="3">
                <div class="progress-dot"></div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step" data-step="4">
                <div class="progress-dot"></div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-step" data-step="5">
                <div class="progress-dot"></div>
            </div>
        </div>
    </div>

    <script src="wallet-connect.js"></script>
    <script src="shared.js"></script>
    <script src="onboarding-nav.js"></script>
</body>
</html>
